name: agentharness

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: agentharness
      POSTGRES_USER: ${POSTGRES_USER:-agentharness}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentharness}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
